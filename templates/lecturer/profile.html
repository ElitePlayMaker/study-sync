{% extends 'layouts/dashboard.html' %}
{% block title %}Lecturer Profile — {{ APP_NAME }}{% endblock %}
{% block page_title %}Lecturer Profile{% endblock %}
{% block sidebar %}
<nav class="nav flex-column ss-sidebar-nav">
    <a class="nav-link" href="{{ url_for('lecturer.dashboard') }}"><i class="bi bi-grid me-2"></i>Overview</a>
    <a class="nav-link active" href="{{ url_for('lecturer.profile') }}"><i class="bi bi-person me-2"></i>Profile</a>
</nav>
{% endblock %}
{% block dashboard_content %}
<div class="col-lg-8 mx-auto">
    <div class="ss-card ss-fade-in">
        <form method="post" class="row g-3">
            <div class="col-md-6"><label class="form-label">Name</label><input type="text" name="name" class="form-control" value="{{ user.name }}" required></div>
            <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" value="{{ user.email }}" disabled></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}"></div>
            <div class="col-md-6"><label class="form-label">Department</label><input type="text" name="department" class="form-control" value="{{ user.department or '' }}"></div>
            <div class="col-12"><label class="form-label">Bio</label><textarea name="bio" class="form-control" rows="4">{{ user.bio or '' }}</textarea></div>
            <div class="col-12"><button class="btn btn-primary ss-btn-primary">Save Profile</button></div>
        </form>
    </div>
</div>
{% endblock %}
