{% extends 'layouts/dashboard.html' %}
{% block title %}Edit Class — {{ APP_NAME }}{% endblock %}
{% block page_title %}Edit Class{% endblock %}
{% block dashboard_content %}
<div class="col-lg-8 mx-auto">
    <div class="ss-card ss-fade-in">
        <form method="post" class="row g-3">
            <div class="col-md-8"><label class="form-label">Title</label><input type="text" name="title" class="form-control" value="{{ class_item.title }}" required></div>
            <div class="col-md-4"><label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="active" {% if class_item.status == 'active' %}selected{% endif %}>Active</option>
                    <option value="archived" {% if class_item.status == 'archived' %}selected{% endif %}>Archived</option>
                </select>
            </div>
            <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3">{{ class_item.description }}</textarea></div>
            <div class="col-md-4"><label class="form-label">Category</label><input type="text" name="category" class="form-control" value="{{ class_item.category }}"></div>
            <div class="col-md-4"><label class="form-label">Location</label><input type="text" name="location" class="form-control" value="{{ class_item.location }}"></div>
            <div class="col-md-4"><label class="form-label">Duration (min)</label><input type="number" name="duration_minutes" class="form-control" value="{{ class_item.duration_minutes }}"></div>
            <div class="col-12 d-flex gap-2">
                <button class="btn btn-primary ss-btn-primary">Save Changes</button>
                <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
