{% extends 'layouts/base.html' %}
{% block title %}Student Login — {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="ss-card ss-fade-in">
            <h3 class="mb-3"><i class="bi bi-person-badge me-2 text-primary"></i>Student Login</h3>
            <form method="post">
                <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
                <button class="btn btn-primary w-100 ss-btn-primary">Sign In</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
