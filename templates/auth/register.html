{% extends 'layouts/base.html' %}
{% block title %}Register — {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="ss-card ss-fade-in">
            <h3 class="mb-1">Create Student Account</h3>
            <p class="text-muted mb-4">Join {{ APP_NAME }} and start booking sessions.</p>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone <span class="text-muted">(optional)</span></label>
                    <input type="tel" name="phone" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Department <span class="text-muted">(optional)</span></label>
                    <input type="text" name="department" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" minlength="6" required>
                </div>
                <button class="btn btn-primary w-100 ss-btn-primary">Create Account</button>
            </form>
            <p class="mt-3 mb-0 text-center text-muted">Already have an account? <a href="{{ url_for('auth.student_login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
